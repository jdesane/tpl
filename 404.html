<!DOCTYPE html>

<style>
:root{--bg:#0a0a0f;--surface:#12121a;--border:#2a2a3d;--accent:#6c63ff;--accent-hi:#8b85ff;--text:#e8e8f0;--muted:#8888aa;--dim:#55556a;--white:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(80px,15vw,160px);color:var(--accent);line-height:1;margin-bottom:8px;letter-spacing:0.04em}
h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4vw,36px);color:var(--white);margin-bottom:16px;letter-spacing:0.03em}
p{color:var(--muted);font-size:16px;max-width:440px;line-height:1.7;margin-bottom:32px;font-weight:300}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.links a{color:var(--white);text-decoration:none;padding:12px 28px;border-radius:6px;font-weight:600;font-size:14px;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.2s}
.btn-p{background:var(--accent)}
.btn-p:hover{background:var(--accent-hi);transform:translateY(-1px)}
.btn-s{border:1px solid var(--border);background:transparent;color:var(--muted)}
.btn-s:hover{border-color:var(--accent);color:var(--accent-hi)}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:0.1em}
</style>
</head>
<body>

</div>

</html>
